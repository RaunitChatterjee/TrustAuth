{% extends "base.html" %}

{% block content %}

<h1>Register</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a href="{{ url_for('auth.login') }}">
    Login
</a>

{% endblock %}
