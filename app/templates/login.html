{% extends "base.html" %}

{% block content %}

<h1>Login</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="{{ url_for('auth.register') }}">
    Register
</a>

{% endblock %}
